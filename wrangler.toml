name = "ww-proxy"
main = "src/index.ts"
compatibility_date = "2024-11-27"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

# Static assets (og-image, apple-touch-icon) served directly by Cloudflare's
# edge cache. Requests to paths matching files under `./public` are served
# from the edge; unmatched paths fall through to the worker (default
# behavior when `main` is set and `not_found_handling` is omitted).
[assets]
directory = "./public"
binding = "ASSETS"

[[routes]]
pattern = "ww-proxy.leviwilkerson.com"
custom_domain = true

[vars]
APP_VERSION = "dev"
COMMIT_SHA = "local"

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 60
  period = 60

[observability]
enabled = true
head_sampling_rate = 1 # optional. default = 1.
logs.persist = true

# Secrets should be set via:
# wrangler secret put HERE_API_KEY
# wrangler secret put SENTRY_DSN
